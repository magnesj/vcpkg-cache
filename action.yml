name: "vcpkg-cache"
description: "Caches filesystem vcpkg archives using actions/cache"
branding:
  icon: "archive"
  color: "yellow"
inputs:
  token:
    description: "GitHub workflow token (no longer required, kept for backward compatibility)"
    required: false
  cache-key:
    description: "Stable key identifying this cache configuration (e.g. a hash of vcpkg.json, triplet, and compiler version). All vcpkg binaries are bundled into a single cache entry per key."
    required: true
  prefix:
    description: "Prefix added to the cache key. Can be used to independently cache entries for each vcpkg triplet."
    required: false
    default: "vcpkg/"
outputs:
  path:
    description: "Absolute path to the written cache"
runs:
  using: "node24"
  main: "dist/restore/index.js"
  post: "dist/save/index.js"
